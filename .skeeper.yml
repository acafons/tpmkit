sidecar: git@github.com:acafons/tpmkit-specs.git
settings:
  guardrails:
    max_files: 100
    max_bytes: 10485760
  hooks:
    pre_push_timeout: 30s
    allow_skip_env: SKEEPER_SKIP
namespaces:
  - name: tpmkit
    patterns:
      - '**/SPEC.md'
      - docs/specs/**
      - .claude/plans/**
      - '**/*.spec.md'
      - .compozy/**/*.md
      - .spec/**/*.md
